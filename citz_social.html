<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CITZ Social</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  width: 1536px;
  height: 1024px;
  background: url('https://raw.githubusercontent.com/todolandia/CITZ_SOCIAL/refs/heads/main/1.png') no-repeat;
  background-size: 1536px 1024px;
  background-position: top left;
  color: white;
  position: relative;
}

/* CONTENEDOR */
.login-box {
  position: absolute;
  left: 890px;
  top: 200px;
  width: 420px;
}

/* TITULO */
h2 {
  margin-bottom: 25px;
  font-size: 28px;
}

/* INPUTS */
.input-group {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.4);
  color: white;
}

input:focus {
  border: 1px solid #8B5CF6;
  box-shadow: 0 0 10px #8B5CF6;
}

/* LINK */
.forgot {
  text-align: right;
  font-size: 13px;
  margin-top: 5px;
  margin-bottom: 15px;
  color: #c084fc;
  cursor: pointer;
}

/* BOTÓN GENERAL */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #3B82F6, #8B5CF6, #ec4899);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 20px #8B5CF6;
}

/* DIVISOR */
.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.2);
}

.divider span {
  margin: 0 10px;
  font-size: 12px;
  opacity: 0.7;
}

/* GOOGLE */
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  background: white;
  color: black;
  border-radius: 50px;
  font-weight: 500;
}

.google-btn img {
  width: 20px;
}

.google-btn:hover {
  box-shadow: 0 0 15px rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div class="login-box">

  <h2>Iniciar Sesión</h2>

  <div class="input-group">
    <input type="email" id="email" placeholder="Correo electrónico">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Contraseña">
  </div>

  <div class="forgot">¿Olvidaste tu contraseña?</div>

  <button onclick="emailAuth()">Iniciar Sesión</button>

  <div class="divider">
    <span>O continúa con</span>
  </div>

  <button class="google-btn" onclick="googleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Entrar con Google
  </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f",
  storageBucket: "daniel-web-9d96f.firebasestorage.app",
  messagingSenderId: "97835808356",
  appId: "1:97835808356:web:78bd82b50bf4cdd8f59171"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN EMAIL
window.emailAuth = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    alert("Bienvenido 🚀");
  } catch (error) {
    alert(error.message);
  }
};

// GOOGLE LOGIN
window.googleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

    const user = result.user;

    localStorage.setItem("user", JSON.stringify({
      uid: user.uid,
      name: user.displayName,
      email: user.email,
      photo: user.photoURL
    }));

    window.location.href = `perfil.html?uid=${user.uid}`;

  } catch (error) {
    alert(error.message);
  }
};

</script>

</body>
</html>
