<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CITZ Social</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0d0d0d);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  width: 900px;
  background: #111;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(139,92,246,0.3);
}

.left {
  flex: 1;
  background: linear-gradient(135deg, #3B82F6, #8B5CF6);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 120px;
}

.right {
  flex: 1;
  padding: 40px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3B82F6, #8B5CF6);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  box-shadow: 0 0 15px #8B5CF6;
}

.toggle {
  margin-top: 15px;
  cursor: pointer;
  color: #8B5CF6;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    🤖
  </div>

  <div class="right">
    <h2 id="title">Iniciar Sesión</h2>

    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="emailAuth()">Entrar</button>

    <button onclick="googleLogin()">Entrar con Google</button>

    <div class="toggle" onclick="toggleMode()">
      ¿No tienes cuenta? Regístrate
    </div>
  </div>

</div>

<script type="module">

// 🔥 FIREBASE IMPORTS (CORRECTO PARA HTML)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 TU CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f",
  storageBucket: "daniel-web-9d96f.firebasestorage.app",
  messagingSenderId: "97835808356",
  appId: "1:97835808356:web:78bd82b50bf4cdd8f59171",
  measurementId: "G-R83EYY563R"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");


// 🔐 EMAIL LOGIN / REGISTER
window.emailAuth = async () => {
  const email = emailInput.value;
  const pass = passwordInput.value;

  try {
    if (isLogin) {
      await signInWithEmailAndPassword(auth, email, pass);
      alert("Bienvenido a CITZ Social 🚀");
    } else {
      await createUserWithEmailAndPassword(auth, email, pass);
      alert("Cuenta creada correctamente 🚀");
    }
  } catch (error) {
    console.error(error.code, error.message);
    alert(error.message);
  }
};


// 🌐 GOOGLE LOGIN (REACTIVADO)
window.googleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

    console.log("Usuario:", result.user);
    alert("Bienvenido " + result.user.displayName);

  } catch (error) {
    console.error(error.code, error.message);
    alert("Error Google: " + error.message);
  }
};


// 🔁 TOGGLE LOGIN / REGISTER
window.toggleMode = () => {
  isLogin = !isLogin;
  document.getElementById("title").innerText =
    isLogin ? "Iniciar Sesión" : "Registro";
};

</script>

</body>
</html>
