<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Diario</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}

h2 {
  text-align: center;
}

.alumno {
  background: white;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
}

.nombre {
  font-weight: bold;
}

select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>Registro Diario</h2>

<input type="date" id="fecha">

<div id="lista"></div>

<button onclick="guardarTodo()">Guardar Todo</button>

<script>
const alumnos = [
  "Juan Pérez",
  "María López",
  "Carlos Ramírez"
];

const URL = "PEGA_AQUI_TU_URL";

let registros = {};

function crearLista() {
  const contenedor = document.getElementById("lista");

  alumnos.forEach(nombre => {

    registros[nombre] = {
      calificacion: "",
      conducta: ""
    };

    const div = document.createElement("div");
    div.className = "alumno";

    div.innerHTML = `
      <div class="nombre">${nombre}</div>

      Calificación:
      <select onchange="actualizar('${nombre}', this.value, 'calificacion')">
        ${opciones()}
      </select>

      Conducta:
      <select onchange="actualizar('${nombre}', this.value, 'conducta')">
        ${opciones()}
      </select>
    `;

    contenedor.appendChild(div);
  });
}

function opciones() {
  let html = `<option value="">Seleccionar</option>`;
  for (let i = 0; i <= 10; i++) {
    html += `<option value="${i}">${i}</option>`;
  }
  return html;
}

function actualizar(nombre, valor, tipo) {
  registros[nombre][tipo] = valor;
}

function guardarTodo() {

  const fecha = document.getElementById("fecha").value;

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  for (let alumno in registros) {

    const data = {
      fecha: fecha,
      alumno: alumno,
      calificacion: registros[alumno].calificacion,
      conducta: registros[alumno].conducta
    };

    fetch(URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

  }

  alert("Datos guardados correctamente ✅");
}

crearLista();
</script>

</body>
</html>
