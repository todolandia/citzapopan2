<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Diario</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}

.alumno {
  background: white;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
}

.nombre {
  font-weight: bold;
  margin-bottom: 8px;
}

select {
  margin: 5px 0;
  padding: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>Grupo Kinder</h2>

<div id="lista"></div>

<script>
const alumnos = [
  "Juan Pérez",
  "María López",
  "Carlos Ramírez"
];

const URL = "https://script.google.com/macros/s/AKfycbwxxMANTh-6VtDNzvvui5VfnuWHA2S5jrbE22MkYwSBE_pYwXTvwo6X7vf7Kvl5OXDB/exec";

function crearLista() {
  const contenedor = document.getElementById("lista");

  alumnos.forEach(nombre => {

    const div = document.createElement("div");
    div.className = "alumno";

    div.innerHTML = `
      <div class="nombre">${nombre}</div>

      Calificación:
      <select onchange="guardar('${nombre}', this.value, 'calificacion')">
        ${opciones()}
      </select>

      Conducta:
      <select onchange="guardar('${nombre}', this.value, 'conducta')">
        ${opciones()}
      </select>
    `;

    contenedor.appendChild(div);
  });
}

function opciones() {
  let html = "";
  for (let i = 0; i <= 10; i++) {
    html += `<option value="${i}">${i}</option>`;
  }
  return html;
}

function guardar(nombre, valor, tipo) {

  let datos = {
    alumno: nombre,
    calificacion: tipo === "calificacion" ? valor : "",
    conducta: tipo === "conducta" ? valor : ""
  };

  fetch(URL, {
    method: "POST",
    body: JSON.stringify(datos)
  });

}

crearLista();
</script>

</body>
</html>
