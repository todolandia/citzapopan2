<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Campus Virtual CITZapopan</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6a1b9a">
<link rel="apple-touch-icon" href="/icono-192.png">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:white;
}

/* RED NEURONAL */

#network{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:-1;
background:white;
}

/* LOADING */

#loading{
position:fixed;
width:100%;
height:100vh;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* LOGO LOADING */

.loading-logo{
width:120px;
margin-bottom:25px;
animation:flotar 3s ease-in-out infinite;
}

/* ANIMACION LOGO */

@keyframes flotar{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}

.loading-text{
font-size:20px;
margin-bottom:20px;
color:#6a1b9a;
font-weight:bold;
}

.loading-bar{
width:260px;
height:6px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.loading-progress{
height:100%;
width:0%;
background:#6a1b9a;
animation:load 3s linear forwards;
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

/* HEADER */

header{
background-color:#6a1b9a;
color:white;
padding:20px;
text-align:center;
}

main{
display:flex;
justify-content:center;
align-items:center;
height:calc(100vh - 100px);
}

.login-container{
background:#f4f4f9;
padding:30px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:400px;
width:100%;
}

.login-container h2{
text-align:center;
color:#333;
}

label{
display:block;
margin:15px 0 5px;
color:#333;
}

input[type="text"],
input[type="password"]{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
width:100%;
padding:10px;
background-color:#6a1b9a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background-color:#4a148c;
}

.error{
color:red;
text-align:center;
margin-top:10px;
}

.install-btn{
position:fixed;
bottom:20px;
right:20px;
background:#6a1b9a;
color:white;
border:none;
padding:12px 18px;
border-radius:50px;
font-size:14px;
cursor:pointer;
display:none;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<img src="/icono-192.png" class="loading-logo">

<div class="loading-text">
Inicializando Campus Virtual...
</div>

<div class="loading-bar">
<div class="loading-progress"></div>
</div>

</div>

<canvas id="network"></canvas>

<header>
<h1>Campus Virtual CITZapopan</h1>
</header>

<main>

<div class="login-container">

<h2>Iniciar Sesión</h2>

<label for="usuario">Usuario:</label>
<input type="text" id="usuario" autocomplete="username">

<label for="contrasena">Contraseña:</label>
<input type="password" id="contrasena" autocomplete="current-password">

<button onclick="iniciarSesion()">Ingresar</button>

<p class="error" id="errorMensaje"></p>

</div>

</main>

<button id="installBtn" class="install-btn">📲 Instalar App</button>

<script>

/* OCULTAR LOADING */

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},3000);


/* RED NEURONAL */

const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<90;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle="#6a1b9a";
ctx.fill();

particles.forEach(p2=>{

let dist=Math.hypot(p.x-p2.x,p.y-p2.y);

if(dist<140){

ctx.strokeStyle="rgba(106,27,154,0.15)";
ctx.lineWidth=1;

ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(p2.x,p2.y);
ctx.stroke();

}

});

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});


/* LOGIN ORIGINAL */

function iniciarSesion(){

const usuario=document.getElementById("usuario").value.trim();
const contrasena=document.getElementById("contrasena").value.trim();
const errorMensaje=document.getElementById("errorMensaje");

if(usuario==="dgomez" && contrasena==="Daniel2025"){
localStorage.setItem("usuarioAutenticado","dgomez");
window.location.href="usuario1.html";
}

else if(usuario==="dgutierrez" && contrasena==="Diego2026"){
localStorage.setItem("usuarioAutenticado","dgutierrez");
window.location.href="dgutierrez.html";
}

else if(usuario==="lcastillejos" && contrasena==="Luis2026"){
localStorage.setItem("usuarioAutenticado","lcastillejos");
window.location.href="lcastillejos.html";
}

else if(usuario==="acastillejos" && contrasena==="Aaron2026"){
localStorage.setItem("usuarioAutenticado","acastillejos");
window.location.href="acastillejos.html";
}

else if(usuario==="admin" && contrasena==="admin"){
localStorage.setItem("usuarioAutenticado","admin");
window.location.href="admin.html";
}

  else if(usuario==="rhuang" && contrasena==="Regina2026"){
localStorage.setItem("usuarioAutenticado","rhuang");
window.location.href="rhuang.html";
}

else if(usuario==="iarellano" && contrasena==="Ian2026"){
localStorage.setItem("usuarioAutenticado","iarellano");
window.location.href="iarellano.html";
}

else{
errorMensaje.textContent="Usuario o contraseña incorrectos.";
}

}

/* SERVICE WORKER */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/service-worker.js")
}

let deferredPrompt;
const installBtn=document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";

});

installBtn.addEventListener("click",async()=>{

if(deferredPrompt){

deferredPrompt.prompt();
const choice=await deferredPrompt.userChoice;

if(choice.outcome==="accepted"){
console.log("App instalada");
}

deferredPrompt=null;
installBtn.style.display="none";

}

});

</script>

</body>
</html>
