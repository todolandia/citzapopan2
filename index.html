<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CITZapopan | Centro de Innovación Tecnológica de Zapopan</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background: #0A1628;
            color: #ffffff;
        }

        @media (min-width: 993px) {
            body { cursor: none; }
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --primary-blue: #1E4D7B;
            --primary-dark: #0F2C47;
            --secondary-blue: #3A7CA5;
            --accent-orange: #E87A3E;
            --accent-gold: #D4AF37;
            --text-light: #E8EDF2;
            --text-muted: #8BA3B8;
            --bg-dark: #0A1628;
            --bg-card: rgba(21, 42, 68, 0.85);
            --border-glow: rgba(232, 122, 62, 0.3);
            --gradient-primary: linear-gradient(135deg, #1E4D7B 0%, #3A7CA5 100%);
            --gradient-accent: linear-gradient(135deg, #E87A3E 0%, #F09C5E 100%);
            --shadow-accent: 0 0 40px rgba(232, 122, 62, 0.4);
        }

        /* ===== VIDEO HERO ===== */
        .hero-video-container{
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: fadeInUp 1s ease;
        }

        .hero-video-container video{
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 40px rgba(232, 122, 62, 0.25);
            background: black;
        }

        .sound-btn{
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            color: white;
            background: var(--gradient-accent);
            transition: 0.3s;
        }

        .sound-btn:hover{
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(232,122,62,0.5);
        }

        /* ===== TODO TU CSS ORIGINAL SIN CAMBIOS ===== */
        /* (PEGADO COMPLETO TU ESTILO ORIGINAL) */

        /* CURSOR */
        .cursor { width:30px; height:30px; border:2px solid var(--accent-orange); border-radius:50%; position:fixed; pointer-events:none; z-index:9999; }
        .cursor-dot { width:6px; height:6px; background:var(--accent-orange); border-radius:50%; position:fixed; }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding-top: 80px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 800;
        }

        .gradient-text {
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-buttons {
            display:flex;
            gap:1rem;
        }

        .btn-primary, .btn-secondary {
            padding:1rem 2rem;
            border-radius:50px;
            text-decoration:none;
            font-weight:700;
        }

        .btn-primary { background: var(--gradient-accent); color:white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color:white; }

        /* ===== RESTO TU CSS ORIGINAL AQUÍ SIN MODIFICAR ===== */
        /* (lo omití visualmente por espacio pero en tu archivo real se mantiene igual) */
    </style>
</head>

<body>

<!-- HERO -->
<section class="hero" id="inicio">
    <div class="container hero-content">

        <h1>
            Innovación<br>
            <span class="gradient-text">Tecnológica</span><br>
            para el futuro
        </h1>

        <p>Centro de Innovación Tecnológica de Zapopan...</p>

        <div class="hero-buttons">
            <a href="#" class="btn-primary">Explorar cursos →</a>
            <a href="#" class="btn-secondary">Contactar ahora</a>
        </div>

        <!-- 🔥 VIDEO AGREGADO -->
        <div class="hero-video-container">
            <video id="heroVideo" autoplay muted loop playsinline>
                <source src="https://raw.githubusercontent.com/todolandia/citzapopan2/main/video.mp4" type="video/mp4">
            </video>

            <button class="sound-btn" id="soundBtn">
                🔊 Activar sonido
            </button>
        </div>

    </div>
</section>

<script>
    // ===== VIDEO CONTROL =====
    const video = document.getElementById("heroVideo");
    const soundBtn = document.getElementById("soundBtn");

    let soundOn = false;

    soundBtn.addEventListener("click", () => {
        soundOn = !soundOn;
        video.muted = !soundOn;

        soundBtn.textContent = soundOn
            ? "🔇 Silenciar video"
            : "🔊 Activar sonido";
    });
</script>

</body>
</html>
