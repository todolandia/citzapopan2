<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bienvenido Noctis Aarón Castillejos Ocampo</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }

    .slider {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: 0;
    }

    .slides {
      display: flex;
      width: 300%;
      height: 100%;
      animation: slide 15s infinite;
    }

    .slides img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    @keyframes slide {
      0% { transform: translateX(0); }
      33% { transform: translateX(-100vw); }
      66% { transform: translateX(-200vw); }
      100% { transform: translateX(0); }
    }

    .lua-code {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      padding: 15px 20px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 1em;
      white-space: pre-line;
      color: #00ffcc;
      max-width: 400px;
      z-index: 10;
    }

    .music-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .music-btn {
      background: #6a0dad;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }

    .music-btn:hover { background: #5a019c; }

    .tooltip {
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.9em;
      margin-top: 8px;
      max-width: 180px;
      text-align: center;
    }

    img.logo {
      height: 80px;
      margin: 40px auto 20px;
      display: block;
      position: relative;
      z-index: 10;
    }

    .container {
      background: rgba(255,255,255,0.95);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 600px;
      width: 90%;
      margin: 20px auto 40px;
      color: #000;
      position: relative;
      z-index: 10;
    }

    h1 {
      font-size: 2.2em;
      background: linear-gradient(to right, #6a0dad, #a64ac9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    h2 {
      font-weight: 500;
      color: #333;
      margin-bottom: 24px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 26px;
    }

    .menu a {
      text-decoration: none;
      background-color: #6a0dad;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 1.05em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .menu a:hover {
      background-color: #5a019c;
    }

    .logout-btn {
      background-color: #ff4d4f;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
    }

    footer {
      margin-top: 18px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>

<body>

<div class="slider">
  <div class="slides">
    <img src="https://digitalfamily.mx/innovandojuntos/wp-content/uploads/2022/11/roblox.jpg">
    <img src="https://pbs.twimg.com/media/Et5PyL7VoAI-IFs?format=jpg&name=large">
    <img src="https://create.roblox.com/21dc8de7a20d68e3db11804f9a7add83cf29f08d/assets/landing/studio.webp">
  </div>

  <div class="lua-code" id="code"></div>

  <div class="music-container">
    <button class="music-btn" onclick="toggleMusic()" id="musicButton">
      🔊 Música
    </button>
    <div class="tooltip" id="musicTooltip">Da clic para reproducir el audio</div>
  </div>
</div>

<img class="logo" src="https://raw.githubusercontent.com/todolandia/citzapopan2/refs/heads/main/logo.png">

<div class="container">

<h1>Bienvenido Noctis Aarón Castillejos Ocampo</h1>
<h2>Curso: Scripting Lua - Roblox Studio</h2>

<nav class="menu">

<a href="avance.html"><i class="fas fa-chart-line"></i> Avance</a>
<a href="scratch_arduino.html"><i class="fas fa-robot"></i> Curso Scratch y Arduino</a>
</nav>

<button class="logout-btn" onclick="cerrarSesion()">
<i class="fas fa-sign-out-alt"></i> Cerrar sesión
</button>

<footer>
© 2025 Plataforma Educativa CITZapopan
</footer>

</div>

<audio id="bgMusic" loop>
<source src="audio.ogg" type="audio/ogg">
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

window.addEventListener('load', () => {

const usuario = localStorage.getItem("usuarioAutenticado");

if (usuario !== "acastillejos") {
alert("Acceso no autorizado");
window.location.href = "index.html";
}

const nombreUsuario = localStorage.getItem("nombreUsuario") || "Noctis Aarón Castillejos Ocampo";

document.querySelector("h1").textContent = "Bienvenido " + nombreUsuario;

document.title = "Bienvenido " + nombreUsuario + " - Curso Scripting Lua";

typeCode();

});

function cerrarSesion(){
alert("Sesión cerrada");
window.location.href="index.html";
}

const codeElement = document.getElementById("code");

const luaCode =
`local part = Instance.new("Part")
part.Anchored = true
part.BrickColor = BrickColor.new("Bright red")
part.Position = Vector3.new(0, 5, 0)
part.Parent = workspace`;

let i = 0;

function typeCode(){

if(i < luaCode.length){

codeElement.textContent += luaCode.charAt(i);

i++;

setTimeout(typeCode,50);

}

}

const music = document.getElementById("bgMusic");

function toggleMusic(){

if(music.paused){
music.play();
}else{
music.pause();
}

}

</script>

</body>
</html>
