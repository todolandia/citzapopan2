<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil CITZ</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

/* 🔥 MENÚ SUPERIOR */
#menu {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17, 17, 17, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  padding: 14px 28px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 14px;
  z-index: 9999;
}

#menu button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #8B5CF6;
  color: white;
  cursor: pointer;
  font-size: 15px;
}

#menu button:hover { box-shadow: 0 0 10px #8B5CF6; }

/* CAMPANA DE NOTIFICACIONES */
#bellWrap { position: relative; }

#bellBtn {
  background: #1a1a1a;
  font-size: 18px;
  position: relative;
}

#bellCount {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #ec4899;
  color: white;
  font-size: 11px;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#notifPanel {
  display: none;
  position: absolute;
  right: 0;
  top: 45px;
  width: 280px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 10px;
  max-height: 300px;
  overflow-y: auto;
}

.notifItem {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 4px;
  border-bottom: 1px solid #2a2a2a;
  font-size: 13px;
}

.notifItem img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
.notifItem .acciones { margin-left: auto; display: flex; gap: 5px; }
.notifItem button { padding: 4px 8px; font-size: 12px; margin: 0; }

/* CONTENIDO */
#contenidoWrap {
  position: relative;
  z-index: 1;
  margin-top: 90px;
  margin-bottom: 60px;
  padding: 30px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;

  background: rgba(13, 13, 13, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* CABECERA DE PERFIL */
#cabecera {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 30px;
}

#fotoPerfilWrap {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 4px solid #8B5CF6;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 25px rgba(139, 92, 246, 0.35);
}

#fotoPerfilWrap img { width: 100%; height: 100%; object-fit: cover; }
#fotoPerfilWrap:hover::after {
  content: "📷 Cambiar";
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  font-size: 14px;
  text-align: center;
  padding: 8px 0;
}

#nombrePerfil { margin-top: 16px; font-size: 30px; font-weight: bold; }

#agregarAmigoBtnTop { margin-top: 14px; font-size: 15px; padding: 12px 20px; }

/* BARRA DE AMIGOS */
#amigosBar {
  margin: 20px 0 30px 0;
}

#amigosBar h3 { font-size: 17px; opacity: 0.8; margin-bottom: 12px; }

#listaAmigos {
  display: flex;
  gap: 18px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.amigoItem {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 80px;
  flex-shrink: 0;
}

.amigoItem img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #333;
}

.amigoItem span {
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 80px;
}

/* MÚSICA */
#musicaSection {
  margin-bottom: 35px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  padding: 25px;
  border: 1px solid rgba(255,255,255,0.08);
}

#musicaSection h3 { font-size: 20px; opacity: 0.9; margin-bottom: 18px; }

.cancionItem {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

.cancionItem .tituloCancion {
  font-size: 18px;
  color: #c084fc;
  margin-bottom: 12px;
  font-weight: bold;
}

.cancionItem audio {
  width: 100%;
  height: 54px;
}

.slotEditorMusica {
  background: #1a1a1a;
  border: 2px dashed #444;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

.slotEditorMusica:hover { border-color: #8B5CF6; }

.slotEditorMusica label {
  display: block;
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 6px;
  margin-top: 10px;
}

.slotEditorMusica label:first-child { margin-top: 0; }

.slotEditorMusica input[type=text] {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  background: #0d0d0d;
  color: white;
  border: 1px solid #333;
  border-radius: 8px;
  margin-bottom: 4px;
  box-sizing: border-box;
}

.slotEditorMusica input[type=file] {
  display: block;
  width: 100%;
  padding: 14px;
  background: #0d0d0d;
  border: 1px solid #333;
  border-radius: 8px;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

#editorMusica button {
  font-size: 16px;
  padding: 14px 20px;
  width: 100%;
}

/* FONDO PERSONALIZADO DEL USUARIO (detrás de todo) */
#contenidoLibre {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  z-index: 0;
  background: #0d0d0d;
}

/* COMENTARIOS */
#comentarios h3 { font-size: 17px; margin-bottom: 14px; }

#nuevoComentario {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

#nuevoComentario textarea {
  flex: 1;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  resize: vertical;
  min-height: 50px;
}

.comentarioItem {
  background: #141414;
  border: 1px solid #222;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}

.comentarioItem .autor { font-weight: bold; font-size: 15px; color: #c084fc; }
.comentarioItem .texto { font-size: 16px; margin-top: 6px; line-height: 1.5; }
.comentarioItem .fecha { font-size: 12px; opacity: 0.5; margin-top: 6px; }

#paginacion {
  display: flex;
  justify-content: center;
  gap: 14px;
  align-items: center;
  margin-top: 20px;
  font-size: 15px;
}

#paginacion button:disabled { opacity: 0.3; cursor: default; }

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #8B5CF6;
  color: white;
  cursor: pointer;
  font-size: 14px;
}
button:hover { box-shadow: 0 0 10px #8B5CF6; }

input[type=file] { display: none; }
</style>
</head>
<body>

<!-- Fondo de pantalla completa: aquí vive el diseño personalizado del usuario -->
<div id="contenidoLibre"></div>

<div id="menu">
  <div id="bellWrap">
    <button id="bellBtn" onclick="toggleNotif()">🔔<span id="bellCount" style="display:none;">0</span></button>
    <div id="notifPanel"></div>
  </div>
  <button id="editarBtn" style="display:none;" onclick="editar()">✏️ Editar perfil</button>
</div>

<div id="contenidoWrap">

  <div id="cabecera">
    <div id="fotoPerfilWrap" onclick="if(window.esMiPerfil) { document.getElementById('fotoInput').click(); } else { console.log('No puedes cambiar la foto de otro perfil. esMiPerfil =', window.esMiPerfil); }">
      <img id="fotoPerfil" src="https://via.placeholder.com/120/1a1a1a/8B5CF6?text=CITZ" alt="Foto de perfil">
    </div>
    <input type="file" id="fotoInput" accept="image/*">
    <div id="nombrePerfil">Cargando...</div>
    <button id="agregarAmigoBtnTop" style="display:none;" onclick="enviarSolicitud()">➕ Agregar amigo</button>
  </div>

  <div id="amigosBar">
    <h3>Amigos</h3>
    <div id="listaAmigos"></div>
  </div>

  <div id="musicaSection">
    <h3>🎵 Música</h3>
    <div id="listaMusica"></div>
    <div id="editorMusica" style="display:none;"></div>
  </div>

  <div id="comentarios">
    <h3>💬 Comentarios</h3>
    <div id="nuevoComentario" style="display:none;">
      <textarea id="textoComentario" placeholder="Deja un comentario..."></textarea>
      <button onclick="enviarComentario()">Enviar</button>
    </div>
    <div id="listaComentarios"></div>
    <div id="paginacion">
      <button id="btnAnterior" onclick="cambiarPagina(-1)">← Anterior</button>
      <span id="infoPagina"></span>
      <button id="btnSiguiente" onclick="cambiarPagina(1)">Siguiente →</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, addDoc, getDocs, query, where, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ---------- CLOUDINARY ----------
const CLOUDINARY_CLOUD_NAME = "subyy7sq";
const CLOUDINARY_UPLOAD_PRESET = "citz_uploads";

async function subirACloudinary(archivo) {
  const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`;
  const formData = new FormData();
  formData.append("file", archivo);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

  const respuesta = await fetch(url, { method: "POST", body: formData });
  if (!respuesta.ok) {
    const errorTexto = await respuesta.text();
    throw new Error(`Cloudinary respondió ${respuesta.status}: ${errorTexto}`);
  }
  const data = await respuesta.json();
  return data.secure_url;
}

const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f",
  storageBucket: "daniel-web-9d96f.firebasestorage.app",
  messagingSenderId: "97835808356",
  appId: "1:97835808356:web:78bd82b50bf4cdd8f59171"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Perfil que se está viendo (de la URL)
const params = new URLSearchParams(window.location.search);
const uidPerfil = params.get("uid");

let miUid = null;
let esMiPerfil = false;
window.esMiPerfil = false;

let todosComentarios = [];
let paginaActual = 0;
const COMENTARIOS_POR_PAGINA = 10;

const SANTITO = {
  nombre: "Santito",
  foto: "https://raw.githubusercontent.com/todolandia/CITZ_SOCIAL/refs/heads/main/santito.png"
};

// ---------- CARGAR PERFIL ----------
async function cargarPerfil() {
  const ref = doc(db, "users", uidPerfil);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();
    document.getElementById("nombrePerfil").textContent = data.displayName || "Usuario CITZ";
    if (data.photoURL) {
      document.getElementById("fotoPerfil").src = data.photoURL;
    }
    document.getElementById("contenidoLibre").innerHTML = data.html || "<p>Este perfil aún no tiene contenido.</p>";
    renderMusica(data.music);
  } else {
    document.getElementById("nombrePerfil").textContent = "Usuario CITZ";
    document.getElementById("contenidoLibre").innerHTML = "<p>Perfil vacío.</p>";
    renderMusica([]);
  }
}

// ---------- AMIGOS ----------
async function cargarAmigos() {
  const lista = document.getElementById("listaAmigos");
  lista.innerHTML = "";

  // Santito siempre aparece primero
  lista.innerHTML += `
    <div class="amigoItem">
      <img src="${SANTITO.foto}" alt="Santito">
      <span>${SANTITO.nombre}</span>
    </div>`;

  const amigosSnap = await getDocs(collection(db, "users", uidPerfil, "friends"));
  amigosSnap.forEach(d => {
    const a = d.data();
    lista.innerHTML += `
      <div class="amigoItem" style="cursor:pointer" onclick="window.location.href='perfil.html?uid=${d.id}'">
        <img src="${a.photoURL || 'https://via.placeholder.com/50'}" alt="${a.displayName}">
        <span>${a.displayName || "Amigo"}</span>
      </div>`;
  });
}

// ---------- ESTADO DE SOLICITUD / BOTÓN AGREGAR AMIGO ----------
async function actualizarBotonAmistad() {
  const btn = document.getElementById("agregarAmigoBtnTop");
  if (!miUid || esMiPerfil) { btn.style.display = "none"; return; }

  // ¿ya somos amigos?
  const amigoRef = doc(db, "users", miUid, "friends", uidPerfil);
  const amigoSnap = await getDoc(amigoRef);
  if (amigoSnap.exists()) {
    btn.textContent = "✅ Son amigos";
    btn.disabled = true;
    btn.style.display = "inline-block";
    return;
  }

  // ¿ya hay solicitud pendiente enviada por mí?
  const q = query(
    collection(db, "friendRequests"),
    where("from", "==", miUid),
    where("to", "==", uidPerfil),
    where("status", "==", "pending")
  );
  const snap = await getDocs(q);
  if (!snap.empty) {
    btn.textContent = "⏳ Solicitud enviada";
    btn.disabled = true;
  } else {
    btn.textContent = "➕ Agregar amigo";
    btn.disabled = false;
  }
  btn.style.display = "inline-block";
}

window.enviarSolicitud = async () => {
  if (!miUid) { alert("Inicia sesión primero."); return; }
  const miDoc = await getDoc(doc(db, "users", miUid));
  const miData = miDoc.exists() ? miDoc.data() : {};

  await addDoc(collection(db, "friendRequests"), {
    from: miUid,
    to: uidPerfil,
    fromName: miData.displayName || "Usuario CITZ",
    fromPhoto: miData.photoURL || "",
    status: "pending",
    timestamp: serverTimestamp()
  });

  alert("Solicitud enviada 🚀");
  actualizarBotonAmistad();
};

// ---------- NOTIFICACIONES ----------
window.toggleNotif = () => {
  const panel = document.getElementById("notifPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

async function cargarNotificaciones() {
  if (!miUid) return;

  const q = query(
    collection(db, "friendRequests"),
    where("to", "==", miUid),
    where("status", "==", "pending")
  );
  const snap = await getDocs(q);

  const panel = document.getElementById("notifPanel");
  const count = document.getElementById("bellCount");

  if (snap.empty) {
    panel.innerHTML = "<div style='font-size:13px; opacity:0.6; padding:8px;'>Sin notificaciones</div>";
    count.style.display = "none";
    return;
  }

  count.style.display = "flex";
  count.textContent = snap.size;
  panel.innerHTML = "";

  snap.forEach(d => {
    const r = d.data();
    panel.innerHTML += `
      <div class="notifItem">
        <img src="${r.fromPhoto || 'https://via.placeholder.com/32'}">
        <span>${r.fromName} quiere ser tu amigo</span>
        <div class="acciones">
          <button onclick="aceptarSolicitud('${d.id}','${r.from}')">Aceptar</button>
        </div>
      </div>`;
  });
}

window.aceptarSolicitud = async (reqId, fromUid) => {
  // marcar solicitud como aceptada
  await updateDoc(doc(db, "friendRequests", reqId), { status: "accepted" });

  // traer datos de ambos usuarios para guardar espejo en /friends
  const [miDoc, otroDoc] = await Promise.all([
    getDoc(doc(db, "users", miUid)),
    getDoc(doc(db, "users", fromUid))
  ]);
  const miData = miDoc.exists() ? miDoc.data() : {};
  const otroData = otroDoc.exists() ? otroDoc.data() : {};

  await setDoc(doc(db, "users", miUid, "friends", fromUid), {
    displayName: otroData.displayName || "Usuario CITZ",
    photoURL: otroData.photoURL || ""
  });
  await setDoc(doc(db, "users", fromUid, "friends", miUid), {
    displayName: miData.displayName || "Usuario CITZ",
    photoURL: miData.photoURL || ""
  });

  alert("¡Ahora son amigos! 🎉");
  cargarNotificaciones();
  if (uidPerfil === miUid) cargarAmigos();
};

// ---------- FOTO DE PERFIL ----------
document.getElementById("fotoInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (!miUid) {
    alert("Debes iniciar sesión para cambiar tu foto.");
    return;
  }

  try {
    const url = await subirACloudinary(file);
    await setDoc(doc(db, "users", miUid), { photoURL: url }, { merge: true });
    document.getElementById("fotoPerfil").src = url;
    console.log("Foto subida correctamente:", url);
  } catch (error) {
    console.error("Error al subir la foto:", error);
    alert("No se pudo subir la foto. Error: " + error.message);
  }
});

// ---------- COMENTARIOS ----------
async function cargarComentarios() {
  const q = query(
    collection(db, "users", uidPerfil, "comments"),
    orderBy("timestamp", "desc")
  );
  const snap = await getDocs(q);
  todosComentarios = [];
  snap.forEach(d => todosComentarios.push(d.data()));
  paginaActual = 0;
  renderComentarios();
}

function renderComentarios() {
  const lista = document.getElementById("listaComentarios");
  lista.innerHTML = "";

  const inicio = paginaActual * COMENTARIOS_POR_PAGINA;
  const pagina = todosComentarios.slice(inicio, inicio + COMENTARIOS_POR_PAGINA);

  if (pagina.length === 0) {
    lista.innerHTML = "<p style='opacity:0.6;'>Aún no hay comentarios.</p>";
  }

  pagina.forEach(c => {
    const fecha = c.timestamp && c.timestamp.toDate ? c.timestamp.toDate().toLocaleString() : "";
    lista.innerHTML += `
      <div class="comentarioItem">
        <div class="autor">${c.authorName || "Anónimo"}</div>
        <div class="texto">${escapeHtml(c.text)}</div>
        <div class="fecha">${fecha}</div>
      </div>`;
  });

  const totalPaginas = Math.max(1, Math.ceil(todosComentarios.length / COMENTARIOS_POR_PAGINA));
  document.getElementById("infoPagina").textContent = `Página ${paginaActual + 1} de ${totalPaginas}`;
  document.getElementById("btnAnterior").disabled = paginaActual === 0;
  document.getElementById("btnSiguiente").disabled = inicio + COMENTARIOS_POR_PAGINA >= todosComentarios.length;
}

window.cambiarPagina = (delta) => {
  paginaActual += delta;
  renderComentarios();
};

window.enviarComentario = async () => {
  if (!miUid) { alert("Inicia sesión para comentar."); return; }
  const texto = document.getElementById("textoComentario").value.trim();
  if (!texto) return;

  const miDoc = await getDoc(doc(db, "users", miUid));
  const miData = miDoc.exists() ? miDoc.data() : {};

  await addDoc(collection(db, "users", uidPerfil, "comments"), {
    authorUid: miUid,
    authorName: miData.displayName || "Usuario CITZ",
    text: texto,
    timestamp: serverTimestamp()
  });

  document.getElementById("textoComentario").value = "";
  cargarComentarios();
};

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

// ---------- MÚSICA ----------
function renderMusica(musicArr) {
  const lista = document.getElementById("listaMusica");
  lista.innerHTML = "";

  const canciones = musicArr || [];
  const conContenido = canciones.filter(c => c && c.url);

  if (conContenido.length === 0) {
    lista.innerHTML = "<p style='opacity:0.6; font-size:13px;'>Este perfil aún no tiene canciones.</p>";
    return;
  }

  conContenido.forEach((c) => {
    lista.innerHTML += `
      <div class="cancionItem">
        <div class="tituloCancion">${escapeHtml(c.titulo || "Sin título")}</div>
        <audio controls preload="none" src="${c.url}"></audio>
      </div>`;
  });
}

window.mostrarEditorMusica = async () => {
  const editor = document.getElementById("editorMusica");
  const ref = doc(db, "users", uidPerfil);
  const snap = await getDoc(ref);
  const musicActual = (snap.exists() && snap.data().music) ? snap.data().music : [{}, {}, {}];

  editor.innerHTML = "<h4 style='color:#c084fc; font-size:16px; margin-bottom:14px;'>🎚️ Agregar o cambiar tus 3 canciones</h4>";
  for (let i = 0; i < 3; i++) {
    const c = musicActual[i] || {};
    editor.innerHTML += `
      <div class="slotEditorMusica">
        <label>Canción ${i + 1} — Título</label>
        <input type="text" id="musTitulo${i}" placeholder="Nombre de la canción" value="${c.titulo ? c.titulo.replace(/"/g, '&quot;') : ''}">
        <label>Pegar URL directa de audio (.mp3) — opcional si subes archivo</label>
        <input type="text" id="musUrl${i}" placeholder="https://..." value="${c.url && !c.subida ? c.url.replace(/"/g, '&quot;') : ''}">
        <label>O subir archivo de audio</label>
        <input type="file" id="musArchivo${i}" accept="audio/*">
      </div>`;
  }
  editor.innerHTML += `<button onclick="guardarMusica()">💾 Guardar canciones</button>`;
  editor.style.display = "block";
};

window.guardarMusica = async () => {
  const nuevaMusica = [];

  for (let i = 0; i < 3; i++) {
    const titulo = document.getElementById(`musTitulo${i}`).value.trim();
    const urlTexto = document.getElementById(`musUrl${i}`).value.trim();
    const archivo = document.getElementById(`musArchivo${i}`).files[0];

    let urlFinal = urlTexto;
    let subida = false;

    if (archivo) {
      try {
        urlFinal = await subirACloudinary(archivo);
        subida = true;
      } catch (error) {
        console.error("Error al subir canción", i, error);
        alert(`No se pudo subir la canción ${i + 1}. Error: ${error.message}`);
        continue;
      }
    }

    if (urlFinal) {
      nuevaMusica.push({ titulo: titulo || `Canción ${i + 1}`, url: urlFinal, subida });
    } else {
      nuevaMusica.push({});
    }
  }

  await setDoc(doc(db, "users", miUid), { music: nuevaMusica }, { merge: true });
  alert("Canciones guardadas 🎶");
  renderMusica(nuevaMusica);
};

// ---------- NAVEGACIÓN ----------
window.editar = () => {
  window.location.href = `editor.html?uid=${uidPerfil}`;
};

// ---------- SESIÓN ----------
onAuthStateChanged(auth, async (user) => {
  if (user) {
    miUid = user.uid;
    esMiPerfil = (miUid === uidPerfil);
    window.esMiPerfil = esMiPerfil;

    // Guarda/actualiza datos básicos del usuario logueado (nombre y foto de Google si no tiene una propia)
    const refMiUser = doc(db, "users", miUid);
    const snapMiUser = await getDoc(refMiUser);
    const dataActual = snapMiUser.exists() ? snapMiUser.data() : {};
    await setDoc(refMiUser, {
      displayName: dataActual.displayName || user.displayName || "Usuario CITZ",
      photoURL: dataActual.photoURL || user.photoURL || ""
    }, { merge: true });

    if (esMiPerfil) {
      document.getElementById("editarBtn").style.display = "inline-block";
      mostrarEditorMusica();
    }

    // Cualquier usuario logueado puede comentar (en cualquier perfil, incluido el suyo)
    document.getElementById("nuevoComentario").style.display = "flex";

    cargarNotificaciones();
    actualizarBotonAmistad();
  }

  cargarPerfil();
  cargarAmigos();
  cargarComentarios();
});

// Si no hay sesión activa todavía, igual mostramos el perfil en modo lectura
setTimeout(() => {
  if (!miUid) {
    cargarPerfil();
    cargarAmigos();
    cargarComentarios();
  }
}, 1500);
</script>
