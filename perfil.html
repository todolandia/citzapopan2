<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil CITZ</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  height: 100vh;
}

/* PANEL IZQUIERDO (EDITOR) */
.editor {
  width: 40%;
  padding: 20px;
  background: #111;
  display: flex;
  flex-direction: column;
}

textarea {
  width: 100%;
  height: 70vh;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 10px;
  font-family: monospace;
}

/* BOTÓN */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #8B5CF6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* PANEL DERECHO (PREVIEW) */
.preview {
  width: 60%;
  padding: 20px;
  background: #0d0d0d;
  overflow: auto;
  border-left: 1px solid #222;
}
</style>
</head>

<body>

<!-- EDITOR -->
<div class="editor">
  <h2>Editor de perfil</h2>

  <textarea id="htmlEditor">
<h1>Mi Perfil</h1>
<p>Escribe tu bio aquí...</p>
<img src="https://via.placeholder.com/150">
  </textarea>

  <button onclick="renderPreview()">Vista previa</button>
</div>

<!-- PREVIEW -->
<div class="preview" id="preview">
  <!-- aquí se renderiza el HTML -->
</div>

<script>

// 🚀 FUNCION VISTA PREVIA
function renderPreview() {
  const html = document.getElementById("htmlEditor").value;
  document.getElementById("preview").innerHTML = html;
}

// 🔥 CARGA INICIAL
renderPreview();

</script>

</body>
</html>
