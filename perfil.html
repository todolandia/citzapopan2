<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>
  <style>
    body { color: white; background: #111; font-family: 'Poppins', sans-serif; padding: 20px; }
    img { border-radius: 50%; width: 100px; }
  </style>
</head>
<body>

  <h1>Perfil</h1>
  <img id="photo" src="" alt="Foto de perfil">
  <h2 id="name"></h2>
  <p id="email"></p>

  <script type="module">
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase ya inicializado en tu app principal
    const db = getFirestore();

    // Obtener UID desde la URL
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");

    async function loadProfile() {
      if (!uid) {
        alert("UID no encontrado");
        return;
      }

      const docRef = doc(db, "users", uid);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const userData = docSnap.data();
        document.getElementById("name").innerText = userData.name;
        document.getElementById("email").innerText = userData.email;
        document.getElementById("photo").src = userData.photo;
      } else {
        alert("Perfil no encontrado");
      }
    }

    loadProfile();
  </script>

</body>
</html>
