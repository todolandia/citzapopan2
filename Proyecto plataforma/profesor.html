<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profesor | Plataforma Educativa</title>

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef1f5}

/* TOPBAR */
.topbar{
    height:64px;
    background:linear-gradient(90deg,#11998e,#38ef7d);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    box-shadow:0 2px 10px rgba(0,0,0,.2)
}
.topbar button{
    background:#c0392b;
    border:none;
    color:white;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer
}

/* LAYOUT */
.container{display:flex;min-height:calc(100vh - 64px)}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#1e272e;
    color:white;
    padding:25px
}
.sidebar h3{margin-top:0}
.sidebar button{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    background:#2f3640;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:14px
}
.sidebar button:hover{background:#353b48}

/* MAIN */
.main{flex:1;padding:30px}

/* BANNER */
.banner{
    background:linear-gradient(90deg,#74ebd5,#ACB6E5);
    padding:25px;
    border-radius:16px;
    color:#2c3e50;
    margin-bottom:30px
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px
}
.card{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
    position:relative
}
.card span{
    font-size:30px;
    position:absolute;
    top:15px;
    right:20px;
    opacity:.2
}

/* BOX */
.box{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
    margin-bottom:25px
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc
}
.action{
    background:#11998e;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer
}

/* ITEMS */
.item{
    background:#f1f2f6;
    padding:15px;
    border-radius:10px;
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    align-items:center
}
.tag{
    background:#0984e3;
    color:white;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px
}
.date{font-size:12px;color:#555}
</style>
</head>

<body>

<div class="topbar">
    <h2>Plataforma Educativa · Profesor</h2>
    <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">

<div class="sidebar">
    <h3>Profesor</h3>
    <button onclick="dashboard()">📊 Dashboard</button>
    <button onclick="recursos()">📚 Recursos</button>
    <button onclick="actividades()">📝 Actividades</button>
    <button onclick="mensajes()">📢 Mensajes</button>
</div>

<div class="main" id="contenido"></div>

</div>

<script>
if(!localStorage.getItem("demoLoaded")){
    localStorage.setItem("recursos",JSON.stringify([
        {titulo:"Planeación Semana 1",desc:"Objetivos y actividades",tipo:"Planeación",fecha:"10 Ene"},
        {titulo:"Guía de Trabajo",desc:"Indicaciones generales",tipo:"Guía",fecha:"11 Ene"},
        {titulo:"Material PDF",desc:"Lectura apoyo",tipo:"PDF",fecha:"12 Ene"}
    ]));
    localStorage.setItem("actividades",JSON.stringify([
        {nombre:"Actividad Diagnóstica",fecha:"15 Ene"},
        {nombre:"Proyecto Integrador",fecha:"22 Ene"}
    ]));
    localStorage.setItem("mensajes",JSON.stringify([
        "Bienvenidos al curso",
        "Revisen los recursos antes de la clase"
    ]));
    localStorage.setItem("demoLoaded","1");
}

let recursosData=JSON.parse(localStorage.getItem("recursos"));
let actividadesData=JSON.parse(localStorage.getItem("actividades"));
let mensajesData=JSON.parse(localStorage.getItem("mensajes"));

function dashboard(){
    contenido.innerHTML=`
    <div class="banner">
        <h2>👋 Bienvenido Profesor</h2>
        <p>Este es tu panel de gestión académica.</p>
    </div>

    <div class="cards">
        <div class="card">📚 Recursos<br><strong>${recursosData.length}</strong><span>📚</span></div>
        <div class="card">📝 Actividades<br><strong>${actividadesData.length}</strong><span>📝</span></div>
        <div class="card">📢 Mensajes<br><strong>${mensajesData.length}</strong><span>📢</span></div>
    </div>

    <div class="box">
        <h3>📌 Próxima actividad</h3>
        <p><strong>${actividadesData[0].nombre}</strong> · ${actividadesData[0].fecha}</p>
    </div>

    <div class="box">
        <h3>🕒 Último mensaje</h3>
        <p>${mensajesData[0]}</p>
    </div>
    `;
}

function recursos(){
    let html=`<h2>📚 Recursos</h2>`;
    recursosData.forEach((r,i)=>{
        html+=`
        <div class="item">
            <div>
                <strong>${r.titulo}</strong><br>
                <small>${r.desc}</small><br>
                <span class="tag">${r.tipo}</span>
                <span class="date"> · ${r.fecha}</span>
            </div>
            <button onclick="delRecurso(${i})">❌</button>
        </div>`;
    });
    contenido.innerHTML=html;
}
function delRecurso(i){
    recursosData.splice(i,1);
    localStorage.setItem("recursos",JSON.stringify(recursosData));
    recursos();
}

function actividades(){
    let html=`<h2>📝 Actividades</h2>`;
    actividadesData.forEach((a,i)=>{
        html+=`
        <div class="item">
            <div>
                <strong>${a.nombre}</strong><br>
                <span class="date">Fecha límite: ${a.fecha}</span>
            </div>
            <button onclick="delActividad(${i})">❌</button>
        </div>`;
    });
    contenido.innerHTML=html;
}
function delActividad(i){
    actividadesData.splice(i,1);
    localStorage.setItem("actividades",JSON.stringify(actividadesData));
    actividades();
}

function mensajes(){
    let html=`<h2>📢 Mensajes</h2>`;
    mensajesData.forEach((m,i)=>{
        html+=`
        <div class="box">
            <p>${m}</p>
        </div>`;
    });
    contenido.innerHTML=html;
}

function logout(){
    localStorage.removeItem("loggedUser");
    location.href="index.html";
}

dashboard();
</script>

</body>
</html>
