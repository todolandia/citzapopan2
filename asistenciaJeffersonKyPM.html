
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jefferson Kinder y PMenor | CITZapopan</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      background:#f4f6f9;
      color:#222;
      padding:30px;
    }

    .header{
      background:#5b189b;
      color:white;
      padding:25px;
      border-radius:20px;
      margin-bottom:30px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .header h1{
      font-size:2rem;
      margin-bottom:10px;
    }

    .header p{
      opacity:0.9;
    }

    .container{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .group-card{
      background:white;
      border-radius:20px;
      padding:25px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .group-title{
      color:#5b189b;
      font-size:1.5rem;
      margin-bottom:20px;
      border-bottom:2px solid #eee;
      padding-bottom:10px;
    }

    .student{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 0;
      border-bottom:1px solid #eee;
    }

    .student:last-child{
      border-bottom:none;
    }

    /* SWITCH */

    .switch{
      position:relative;
      display:inline-block;
      width:60px;
      height:30px;
    }

    .switch input{
      opacity:0;
      width:0;
      height:0;
    }

    .slider{
      position:absolute;
      cursor:pointer;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background-color:#e53935;
      transition:.4s;
      border-radius:30px;
    }

    .slider:before{
      position:absolute;
      content:"";
      height:22px;
      width:22px;
      left:4px;
      bottom:4px;
      background:white;
      transition:.4s;
      border-radius:50%;
    }

    input:checked + .slider{
      background-color:#43a047;
    }

    input:checked + .slider:before{
      transform:translateX(30px);
    }

    /* BOTON */

    .button-container{
      margin-top:35px;
      text-align:center;
    }

    .send-btn{
      background:#5b189b;
      color:white;
      border:none;
      padding:18px 40px;
      border-radius:14px;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(91,24,155,0.3);
    }

    .send-btn:hover{
      background:#46106f;
      transform:translateY(-2px);
    }

    /* RESUMEN */

    .summary{
      margin-top:20px;
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    @media(max-width:900px){

      .container{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <!-- HEADER -->

  <div class="header">
    <h1>Jefferson - Kinder y PMenor</h1>
    <p>Panel de asistencia · CITZapopan</p>
  </div>

  <!-- CONTENEDOR -->

  <div class="container">

    <!-- KINDER -->

    <div class="group-card">

      <div class="group-title">
        Kinder
      </div>

      <div id="kinder-list"></div>

    </div>

    <!-- PMENOR -->

    <div class="group-card">

      <div class="group-title">
        PMenor
      </div>

      <div id="pmenor-list"></div>

    </div>

  </div>

  <!-- BOTON -->

  <div class="button-container">

    <button class="send-btn" onclick="enviarAsistencia()">
      Enviar asistencia
    </button>

  </div>

  <!-- RESUMEN -->

  <div class="summary" id="summary">
    Esperando envío...
  </div>

  <script>

    // =========================
    // ALUMNOS
    // =========================

    const kinder = [
      "Juan",
      "Ana",
      "Pedro",
      "María",
      "Luis"
    ];

    const pmenor = [
      "Diego",
      "Fernanda",
      "Sofía",
      "Mateo",
      "Valentina"
    ];

    // =========================
    // CREAR LISTAS
    // =========================

    function crearLista(lista, contenedor, prefijo){

      const div = document.getElementById(contenedor);

      lista.forEach((alumno,index)=>{

        div.innerHTML += `

          <div class="student">

            <span>${alumno}</span>

            <label class="switch">

              <input type="checkbox" id="${prefijo}${index}">

              <span class="slider"></span>

            </label>

          </div>

        `;

      });

    }

    crearLista(kinder,"kinder-list","k");
    crearLista(pmenor,"pmenor-list","p");

    // =========================
    // ENVIAR ASISTENCIA
    // =========================

    function enviarAsistencia(){

      let mensaje = "ASISTENCIA CITZAPOPAN\n\n";

      const fecha = new Date().toLocaleDateString();

      mensaje += "Fecha: " + fecha + "\n\n";

      // =========================
      // KINDER
      // =========================

      mensaje += "KINDER\n";

      kinder.forEach((alumno,index)=>{

        const asistencia =
        document.getElementById("k"+index).checked;

        mensaje += asistencia
        ? alumno + " - ASISTIO\n"
        : alumno + " - FALTA\n";

      });

      mensaje += "\n";

      // =========================
      // PMENOR
      // =========================

      mensaje += "PMENOR\n";

      pmenor.forEach((alumno,index)=>{

        const asistencia =
        document.getElementById("p"+index).checked;

        mensaje += asistencia
        ? alumno + " - ASISTIO\n"
        : alumno + " - FALTA\n";

      });

      // =========================
      // GUARDAR LOCAL
      // =========================

      localStorage.setItem(
        "asistencia_jefferson",
        mensaje
      );

      // =========================
      // RESUMEN
      // =========================

      document.getElementById("summary").innerHTML = `
        <h2>Asistencia guardada correctamente</h2>
        <br>
        <p>La asistencia fue almacenada localmente.</p>
      `;

      // =========================
      // WHATSAPP
      // =========================

      const numero = "5213312345678";

      const mensajeCodificado =
      encodeURIComponent(mensaje);

      window.open(
        `https://wa.me/${numero}?text=${mensajeCodificado}`,
        "_blank"
      );

    }

  </script>

</body>
</html>
